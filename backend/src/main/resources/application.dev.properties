# ==========================================================
# ATIVA OPEN-IN-VIEW
# Permite que a sessão do Hibernate permaneça aberta
# durante toda a requisição HTTP.
#
# Isso possibilita acessar entidades LAZY fora da camada
# de serviço (ex: na camada de controller ou view).
#
# Atenção:
# Pode causar consultas adicionais ao banco fora da
# transação principal e impactar performance.
# ==========================================================
spring.jpa.open-in-view=true